name: Build macOS

on:
  workflow_dispatch:          # uruchom ręcznie z GitHub
  push:
    tags:
      - 'v*'                  # lub automatycznie przy tagu np. v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run package:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-Gallery-macOS
          path: release/macos/*.dmg
          retention-days: 30
